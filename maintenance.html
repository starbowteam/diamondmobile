<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>DIAMOND AI — Технические работы</title>
  <meta name="theme-color" content="#1e1e1e">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background: #1e1e1e;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      /* учёт безопасных зон iOS */
      padding-top: max(20px, env(safe-area-inset-top));
      padding-bottom: max(20px, env(safe-area-inset-bottom));
    }

    .container {
      text-align: center;
      max-width: 400px;
      width: 100%;
      animation: fadeIn 0.6s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 80px;
      margin-bottom: 20px;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }

    h1 {
      font-size: 28px;
      font-weight: 700;
      margin-bottom: 12px;
      background: linear-gradient(135deg, #fff, #aaa);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    p {
      font-size: 16px;
      line-height: 1.4;
      color: #ccc;
      margin-bottom: 24px;
    }

    .telegram-link {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: #2d2d2d;
      padding: 12px 24px;
      border-radius: 40px;
      color: #fff;
      text-decoration: none;
      font-weight: 500;
      font-size: 18px;
      transition: background 0.2s, transform 0.1s;
      border: 1px solid #3a3a3a;
    }

    .telegram-link:active {
      background: #3a3a3a;
      transform: scale(0.97);
    }

    .telegram-link i {
      font-size: 24px;
    }

    .footer {
      margin-top: 40px;
      font-size: 12px;
      color: #666;
    }

    /* анимация для иконки (через обычный символ, т.к. не подключаем FontAwesome) */
    .emoji-icon {
      font-size: 80px;
      line-height: 1;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <span class="emoji-icon">🔧</span>
    </div>
    <h1>Технические работы</h1>
    <p>Мы временно недоступны.<br>Приносим извинения за неудобства.</p>
    <a href="https://t.me/vshpps" class="telegram-link" target="_blank">
      <span>📱</span> Написать в Telegram
    </a>
    <div class="footer">
      Diamond AI · Скоро вернёмся
    </div>
  </div>
</body>
</html>
