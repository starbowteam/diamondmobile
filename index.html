<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, shrink-to-fit=no, viewport-fit=cover">
  <title>DIAMOND AI Mobile</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="DIAMOND AI">
  <link rel="apple-touch-icon" href="icon.png">
  <meta name="theme-color" content="#1e1e1e">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/contrib/mhchem.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension@5.0.0/lib/index.umd.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Блокировка для ПК -->
  <div id="pc-blocker" style="display: none; position: fixed; top:0; left:0; width:100%; height:100%; background:#1e1e1e; z-index:10000; align-items:center; justify-content:center; text-align:center; flex-direction:column; gap:20px;">
    <i class="fas fa-mobile-alt" style="font-size: 80px; color:#2b2b2b;"></i>
    <h2>Доступ только с мобильных устройств</h2>
    <p>Откройте этот сайт на смартфоне</p>
  </div>

  <div class="app" id="app">
    <!-- Загрузочный экран -->
    <div class="welcome-screen" id="welcomeScreen">
      <div class="welcome-content">
        <img src="logotip.png" class="welcome-logo" alt="logo"
             onerror="this.src='https://via.placeholder.com/100x100/1e1e1e/ffffff?text=AI'; this.style.borderRadius='50%';">
        <div class="welcome-title">DIAMOND AI</div>
        <div class="loading-status" id="loadingStatus">Загрузка</div>
        <div class="loading-bar-container">
          <div class="loading-bar" id="loadingBar"></div>
        </div>
      </div>
    </div>

    <!-- Экран ошибки -->
    <div class="error-screen" id="errorScreen" style="display: none;">
      <div class="error-content">
        <i class="fas fa-exclamation-triangle"></i>
        <h1>Ох, незадача!</h1>
        <p>Ключ ИИ истек, ожидайте поставления нового.</p>
        <p class="error-hint">Попробуйте зайти позже или напишите в поддержку.</p>
      </div>
    </div>

    <!-- Основной интерфейс чата -->
    <div class="main-ui" id="mainUI" style="display: none;">
      <header class="mobile-header">
        <div class="header-left">
          <button class="burger-btn" id="burgerBtn">
            <i class="fas fa-bars"></i>
          </button>
        </div>
        <div class="header-center">
          <div class="header-logo">
            <img src="avatark.png" alt="avatar"
                 onerror="this.src='https://via.placeholder.com/28x28/1e1e1e/ffffff?text=AI'; this.style.borderRadius='50%';">
            <span>DIAMOND AI</span>
          </div>
        </div>
        <div class="header-right"></div>
      </header>

      <div class="sidebar-overlay" id="sidebarOverlay"></div>
      <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
          <button class="new-chat-btn" id="newChatBtn">
            <i class="fas fa-plus"></i> <span>Новый чат</span>
          </button>
          <div class="search-box">
            <i class="fas fa-search"></i>
            <input type="text" id="historySearch" placeholder="Поиск...">
          </div>
        </div>
        <div class="history-list" id="historyList"></div>
        <div class="sidebar-footer">
          <button class="sidebar-footer-btn" id="discordBtn" title="Discord"><i class="fab fa-discord"></i></button>
          <button class="sidebar-footer-btn" id="telegramBtn" title="Telegram"><i class="fab fa-telegram"></i></button>
          <button class="sidebar-footer-btn" id="avatarBtn" title="Аватар"><i class="fas fa-user-circle"></i></button>
        </div>
      </aside>

      <main class="chat-area">
        <div class="messages-container" id="messagesContainer"></div>
        <div class="input-area">
          <div class="input-wrapper">
            <textarea id="userInput" placeholder="Сообщение..." rows="1"></textarea>
            <button class="send-btn" id="sendBtn" disabled>
              <i class="fas fa-paper-plane"></i>
            </button>
          </div>
        </div>
      </main>
    </div>

    <!-- Модалка аватара -->
    <div id="avatarModal" class="avatar-modal" style="display: none;">
      <div class="avatar-modal-content">
        <div class="avatar-modal-header">
          <h3>Выберите аватар</h3>
          <button class="close-modal" id="closeAvatarModal"><i class="fas fa-times"></i></button>
        </div>
        <div class="avatar-icons">
          <div class="avatar-icon" data-icon="fa-robot"><i class="fas fa-robot"></i></div>
          <div class="avatar-icon" data-icon="fa-user"><i class="fas fa-user"></i></div>
          <div class="avatar-icon" data-icon="fa-star"><i class="fas fa-star"></i></div>
          <div class="avatar-icon" data-icon="fa-heart"><i class="fas fa-heart"></i></div>
          <div class="avatar-icon" data-icon="fa-fire"><i class="fas fa-fire"></i></div>
          <div class="avatar-icon" data-icon="fa-crown"><i class="fas fa-crown"></i></div>
        </div>
        <div class="avatar-upload">
          <button id="uploadAvatarBtn" class="upload-btn"><i class="fas fa-upload"></i> Загрузить своё</button>
          <button id="resetAvatarBtn" class="reset-btn"><i class="fas fa-undo"></i> Сбросить</button>
        </div>
      </div>
    </div>

    <!-- Контейнер тостов -->
    <div id="toastContainer" class="toast-container"></div>
  </div>

  <script src="script.js"></script>
  <script>
    // Блокировка ПК
    if (!/Mobi|Android|iPhone|iPad|iPod/i.test(navigator.userAgent)) {
      document.getElementById('pc-blocker').style.display = 'flex';
      document.getElementById('app').style.display = 'none';
    }
  </script>
</body>
</html>
